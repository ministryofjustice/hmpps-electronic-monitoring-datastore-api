generic-service:
  nameOverride: hmpps-electronic-monitoring-datastore-api
  productId: "HMPPS529" # productId for the product that this belongs too, i.e. DPS001, see README.md for details

  replicaCount: 4

  image:
    repository: ghcr.io/ministryofjustice/hmpps-electronic-monitoring-datastore-api
    tag: app_version # override at deployment time
    port: 8080

  ingress:
    enabled: true
    host: app-hostname.local # override per environment
    tlsSecretName: hmpps-electronic-monitoring-datastore-cert
    modsecurity_enabled: true
    modsecurity_github_team: "hmpps-electronic-monitoring"

  # Environment variables to load into the deployment
  env:
    SERVER_PORT: "8080"
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: applicationinsights.json
    # JAVA_TOOL_OPTIONS is set in the base image (hmpps-eclipse-temurin) with:
    #   -XX:MaxRAMPercentage=50.0
    # Uncomment below to override memory settings if needed.
    # Check resources.limits.memory is set appropriately.
    #
    # Percentage-based example:
    #   JAVA_TOOL_OPTIONS: "-XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0"
    #
    # Fixed memory example:
    #   JAVA_TOOL_OPTIONS: "-Xms512m -Xmx1024m"
    JAVA_TOOL_OPTIONS: "-Xms512m -Xmx1024m"
    HMPPS_SQS_USEWEBTOKEN: true

  # Pre-existing kubernetes secrets to load as environment variables in the deployment.
  # namespace_secrets:
  #   [name of kubernetes secret]:
  #     [name of environment variable as seen by app]: [key of kubernetes secret to load]

  namespace_secrets:
    hmpps-electronic-monitoring-datastore-api-application-insights:
      APPLICATIONINSIGHTS_CONNECTION_STRING: "APPLICATIONINSIGHTS_CONNECTION_STRING"
    sqs-hmpps-audit-secret:
      HMPPS_SQS_QUEUES_AUDIT_QUEUEARN: "sqs_queue_arn"
      HMPPS_SQS_QUEUES_AUDIT_QUEUENAME: "sqs_queue_name"
    athena-roles:
      ATHENA_GENERAL_IAM_ROLE: "general_role_arn"
      ATHENA_SPECIALS_IAM_ROLE: "specials_role_arn"
    rds-postgresql-instance-output:
      DB_SERVER: "rds_instance_address"
      DB_NAME: "database_name"
      DB_USER: "database_username"
      DB_PASS: "database_password"

  allowlist:
    groups:
      - internal

generic-prometheus-alerts:
  targetApplication: hmpps-electronic-monitoring-datastore-api
